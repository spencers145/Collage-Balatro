[manifest]
version = "1.0.0"
priority = 0

# No hand money from small & big blinds if isometric deck
[[patches]]
[patches.pattern]
target = 'functions/state_events.lua'
pattern = '''
if G.GAME.current_round.hands_left > 0 and not G.GAME.modifiers.no_extra_hand_money then
'''
position = "at"
payload = '''
if G.GAME.current_round.hands_left > 0 and not G.GAME.modifiers.no_extra_hand_money and (not G.GAME.modifiers.cod_isometric or G.GAME.blind.boss) then
'''
match_indent = true

# No discard money from small & big blinds if isometric deck
[[patches]]
[patches.pattern]
target = 'functions/state_events.lua'
pattern = '''
if G.GAME.current_round.discards_left > 0 and G.GAME.modifiers.money_per_discard then
'''
position = "at"
payload = '''
if G.GAME.current_round.discards_left > 0 and G.GAME.modifiers.money_per_discard and (not G.GAME.modifiers.cod_isometric or G.GAME.blind.boss) then
'''
match_indent = true